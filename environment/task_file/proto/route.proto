syntax = "proto3";

package routekit.v1;

message RouteJob {
  string id = 1;
  string payload = 2;
  repeated string hops = 3;
  uint32 priority = 4;
}

message RouteSummary {
  string id = 1;
  string build_mode = 2;
  string path = 3;
  uint32 checksum = 4;
}

service RouteBroker {
  rpc Submit(RouteJob) returns (RouteSummary);
}
