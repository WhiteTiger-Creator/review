global:
  audiences:
    - https://api.example.com
environments:
  production:
    audiences:
      - https://api.example.com/prod
  staging:
    audiences:
      - https://api.example.com/staging
services:
  user-service:
    audiences:
      - https://users.example.com
  billing-service:
    audiences:
      - https://billing.example.com
edges:
  - source: api-gateway
    target: auth-service
    environment: production
    method: POST
    path: /auth/validate
    audiences:
      - https://auth.example.com
  - source: api-gateway
    target: payment-service
    environment: production
    method: POST
    path: /payments/refund
    deny: true
