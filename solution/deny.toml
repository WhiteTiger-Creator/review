[graph]
all-features = true

[advisories]
ignore = []
git-fetch-with-cli = true

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.8

[licenses.private]
ignore = false
registries = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
skip = []
skip-tree = []
deny = [
    { crate = "serde-json-wasm@=1.0.0", reason = "RUSTSEC-2024-0012 affects this quarantined release" },
    { crate = "crossbeam-channel@=0.5.14", reason = "RUSTSEC-2025-0024 affects this quarantined release" },
    { crate = "time@=0.3.36", reason = "RUSTSEC-2026-0009 affects this quarantined release" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
